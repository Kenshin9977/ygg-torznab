services:
  ygg-torznab:
    image: ghcr.io/kenshin9977/ygg-torznab:latest
    container_name: ygg-torznab
    restart: unless-stopped
    ports:
      - "8715:8715"
    environment:
      NOSTR_RELAY: ${NOSTR_RELAY:-wss://relay.ygg.gratis}
      API_KEY: ${API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
